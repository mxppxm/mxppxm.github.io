<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta name="author" content="九日">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:type" content="article">
  <style>
    :root {
      --bg: #0f0f14;
      --bg-card: #1a1a24;
      --text: #e4e4ec;
      --text-secondary: #9ca3af;
      --accent: #f59e0b;
      --accent-dim: #b45309;
      --border: #2d2d3d;
      --green: #10b981;
      --red: #ef4444;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }
    header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.3;
    }
    .meta {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 12px;
    }
    /* TOC */
    .toc {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 36px;
    }
    .toc-title {
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 12px;
      color: var(--accent);
    }
    .toc ol {
      list-style: none;
      counter-reset: toc-counter;
      padding-left: 0;
    }
    .toc ol li {
      counter-increment: toc-counter;
      margin: 6px 0;
      font-size: 0.95rem;
    }
    .toc ol li::before {
      content: counter(toc-counter) ". ";
      color: var(--accent-dim);
      font-weight: 600;
    }
    .toc a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }
    .toc a:hover { color: var(--accent); }
    /* Article body */
    article {
      font-size: 1.05rem;
    }
    article h2 {
      font-size: 1.5rem;
      margin: 40px 0 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--accent-dim);
      color: var(--accent);
    }
    article h3 {
      font-size: 1.2rem;
      margin: 28px 0 12px;
      color: #fbbf24;
    }
    article p {
      margin: 14px 0;
      color: #d1d5db;
    }
    article strong {
      color: var(--text);
    }
    article table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 0.95rem;
    }
    article table th, article table td {
      border: 1px solid var(--border);
      padding: 10px 14px;
      text-align: left;
    }
    article table th {
      background: var(--bg-card);
      color: var(--accent);
      font-weight: 700;
    }
    article table td {
      background: var(--bg);
    }
    article blockquote {
      border-left: 3px solid var(--accent);
      padding: 12px 20px;
      margin: 20px 0;
      background: var(--bg-card);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-secondary);
      font-style: italic;
    }
    article ul, article ol {
      padding-left: 24px;
      margin: 12px 0;
    }
    article li {
      margin: 6px 0;
      color: #d1d5db;
    }
    article hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    article a {
      color: var(--accent);
      text-decoration: underline;
    }
    footer {
      margin-top: 60px;
      padding: 32px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>{{TITLE}}</h1>
      <div class="meta">{{META}}</div>
    </header>
    {{TOC}}
    <article>
      {{CONTENT}}
    </article>
    <footer>
      <p>© 2026 <a href="/">九日</a> · 数据来源：Kitco News、世界黄金协会、上海黄金交易所</p>
    </footer>
  </div>
</body>
</html>
