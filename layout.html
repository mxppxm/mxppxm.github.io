<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
  <title>{{TITLE}} — 九日</title>
  <meta name="description" content="{{DESCRIPTION}}">

  <!-- Open Graph / Social -->
  <meta property="og:title" content="{{OG_TITLE|default:TITLE}} — 九日">
  <meta property="og:description" content="{{OG_DESCRIPTION|default:DESCRIPTION}}">
  <meta property="og:url" content="{{OG_URL}}">
  <meta property="og:type" content="{{PAGE_TYPE|default:article}}">
  <meta property="og:image" content="{{OG_IMAGE|default:https://mxppxm.github.io/og-default.png}}">
  <meta property="og:locale" content="zh_CN">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{OG_TITLE|default:TITLE}} — 九日">
  <meta name="twitter:description" content="{{OG_DESCRIPTION|default:DESCRIPTION}}">

  <!-- Canonical URL -->
  <link rel="canonical" href="{{OG_URL}}">

  <!-- JSON-LD Article Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{TITLE}}",
    "description": "{{DESCRIPTION}}",
    "url": "{{OG_URL}}",
    "image": "{{OG_IMAGE|default:https://mxppxm.github.io/og-default.png}}",
    "datePublished": "{{PUBLISH_DATE_ISO}}",
    "dateModified": "{{PUBLISH_DATE_ISO}}",
    "author": {
      "@type": "Person",
      "name": "九日",
      "url": "https://mxppxm.github.io"
    },
    "publisher": {
      "@type": "Person",
      "name": "九日"
    },
    "keywords": "{{KEYWORDS|default:九日,博客,前端}}"
  }
  </script>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-title">☀️ 九日</a>
      <nav class="site-nav">
        <a href="/#about">关于</a>
        <a href="/#projects">项目</a>
        <a href="/#blog">文章</a>
        <a href="/articles/gold/">🏆 黄金</a>
        <a href="/articles/novel/">📖 小说</a>
        <a href="/articles/skills/">🧰 Skill</a>
        <a href="https://github.com/mxppxm" target="_blank" rel="noopener">GitHub</a>
      </nav>
      <button class="mobile-menu-btn" aria-label="菜单">☰</button>
    </div>
  </header>

  <div class="mobile-nav">
    <a href="/#about">关于</a>
    <a href="/#projects">项目</a>
    <a href="/#blog">文章</a>
    <a href="/articles/gold/">🏆 黄金</a>
    <a href="/articles/skills/">🧰 Skill</a>
    <a href="https://github.com/mxppxm" target="_blank" rel="noopener">GitHub</a>
  </div>

  <main class="container">
    <div class="article-layout">
      <div class="article-main">
        <article>
          <div class="article-header">
            <h1>{{TITLE}}</h1>
            <div class="article-meta">{{META}}</div>
          </div>

          <div class="article-content">
{{CONTENT}}
          </div>
        </article>
      </div>

      <aside class="article-sidebar">
        {{TOC}}
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>☀️ 九日 · 用创意和代码探索世界</p>
      <p class="footer-meta">Built with ❤️ · 2026</p>
    </div>
  </footer>

  <script>
    document.querySelector('.mobile-menu-btn').addEventListener('click', function() {
      document.querySelector('.mobile-nav').classList.toggle('active');
    });
  </script>
</body>
</html>
